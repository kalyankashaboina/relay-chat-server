name: Backend CD

on:
  workflow_run:
    workflows: ["Backend CI"]
    types:
      - completed

concurrency:
  group: cd-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        (github.event.workflow_run.head_branch == 'main' ||
         github.event.workflow_run.head_branch == 'master')
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        run: echo "Logging into Docker Hub..."
      - uses: docker/login-action@v3
        with:
          username: kalyankashaboina
          password: ${{ secrets.DOCKER_PASSWORD }}

      # IMAGE METADATA

      - name: Generate API image tags
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: kalyankashaboina/relay-chat-backend
          tags: |
            latest
            type=sha

      - name: Generate Worker image tags
        id: meta_worker
        uses: docker/metadata-action@v5
        with:
          images: kalyankashaboina/relay-chat-worker
          tags: |
            latest
            type=sha

      # BUILD AND PUSH

      - name: Build and push API image
        run: echo "Building API image..."
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: API image pushed
        run: echo "API image pushed successfully"

      - name: Build and push Worker image
        run: echo "Building Worker image..."
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: ${{ steps.meta_worker.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Worker image pushed
        run: echo "Worker image pushed successfully"

      # DEPLOYMENT TRIGGERS

      - name: Trigger Render deploy
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not set, skipping"
          else
            echo "Triggering Render deploy"
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
            echo "Render deploy triggered"
          fi

      - name: Railway auto deploy info
        run: |
          echo "Railway auto deploy is enabled"
          echo "Latest Docker image will be pulled automatically"

      # FINAL STATUS

      - name: Deployment completed
        run: |
          echo "--------------------------------------"
          echo "Backend CD completed successfully"
          echo "Branch: ${{ github.event.workflow_run.head_branch }}"
          echo "Commit: ${{ github.event.workflow_run.head_sha }}"
          echo "--------------------------------------"