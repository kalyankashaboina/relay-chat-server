name: Backend CD

on:
  workflow_run:
    workflows: ["Backend CI"]
    types:
      - completed

concurrency:
  group: cd-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        (github.event.workflow_run.head_branch == 'main' ||
         github.event.workflow_run.head_branch == 'master')
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: kalyankashaboina
          password: ${{ secrets.DOCKER_PASSWORD }}

      # API image metadata
      - id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: kalyankashaboina/relay-chat-backend
          tags: |
            latest
            type=sha

      # Worker image metadata
      - id: meta_worker
        uses: docker/metadata-action@v5
        with:
          images: kalyankashaboina/relay-chat-worker
          tags: |
            latest
            type=sha

      # Build & push API
      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build & push Worker
      - name: Build & push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: ${{ steps.meta_worker.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trigger Render (API)
      - name: Trigger Render Deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      # Trigger Railway (Worker)
      # - name: Trigger Railway Deploy
      #   if: ${{ secrets.RAILWAY_DEPLOY_HOOK != '' }}
      #   run: curl -X POST ${{ secrets.RAILWAY_DEPLOY_HOOK }}