version: '3.8'

# Backend Development Docker Setup
# Runs MongoDB locally (optional — can use Atlas instead)

services:
  mongo:
    image: mongo:7
    container_name: relay-chat-mongo-dev
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_dev_data:/data/db
    networks:
      - relay-backend-dev
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  relay-backend-dev:
    driver: bridge

volumes:
  mongo_dev_data:
    driver: local
